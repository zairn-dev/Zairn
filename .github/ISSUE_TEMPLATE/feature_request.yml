name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What use case does it address?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about?
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@zairn/sdk"
        - "@zairn/geo-drop"
        - "Web app (apps/web)"
        - "GeoDrop demo (apps/geo-drop-demo)"
        - "Database / RLS"
        - "New package / example"
        - "Other"
    validations:
      required: true
