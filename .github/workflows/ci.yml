name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Type check SDK
        run: pnpm --filter @zairn/sdk exec tsc --noEmit
      - name: Build geo-drop
        run: pnpm --filter @zairn/geo-drop build
      - name: Type check web app
        run: npx tsc --noEmit -p apps/web/tsconfig.json
      - name: Type check geo-drop-demo
        run: npx tsc --noEmit -p apps/geo-drop-demo/tsconfig.json
      - name: Build web app
        run: pnpm --filter web build
      - name: Build geo-drop-demo
        run: pnpm --filter geo-drop-demo build

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: pnpm install --frozen-lockfile
      - name: Start local Supabase
        run: supabase start
      - name: Create .env for tests
        run: |
          echo "SUPABASE_URL=http://127.0.0.1:54321" >> .env
          echo "SUPABASE_ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')" >> .env
      - name: Test connection
        run: pnpm test:connection
      - name: Test SDK
        run: pnpm test:sdk
      - name: Test features
        run: pnpm test:features
      - name: Test auth
        run: pnpm test:auth
      - name: Test chat
        run: pnpm test:chat
      - name: Stop Supabase
        if: always()
        run: supabase stop
