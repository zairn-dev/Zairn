name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build SDK
        run: pnpm --filter @zairn/sdk build
      - name: Build geo-drop
        run: pnpm --filter @zairn/geo-drop build
      - name: Type check web app
        run: npx tsc --noEmit -p apps/web/tsconfig.json
      - name: Type check geo-drop-demo
        run: npx tsc --noEmit -p apps/geo-drop-demo/tsconfig.json
      - name: Build web app
        run: pnpm --filter web build
      - name: Build geo-drop-demo
        run: pnpm --filter geo-drop-demo build

  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install Supabase CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/supabase/cli/main/install.sh | sh
          supabase --version
      - run: pnpm install --frozen-lockfile
      - name: Start local Supabase (skip migrations, apply via psql)
        run: |
          mv supabase/migrations supabase/_migrations_backup
          supabase start
          mv supabase/_migrations_backup supabase/migrations
      - name: Apply schema via psql
        run: |
          DB_URL="postgresql://postgres:postgres@127.0.0.1:54322/postgres"
          psql "$DB_URL" -f database/schema.sql
          psql "$DB_URL" -f database/policies.sql
          psql "$DB_URL" -f packages/geo-drop/database/schema.sql
          psql "$DB_URL" -f packages/geo-drop/database/policies.sql
          psql "$DB_URL" -c "INSERT INTO storage.buckets (id, name, public) VALUES ('avatars', 'avatars', true) ON CONFLICT DO NOTHING;"
      - name: Create .env for tests
        run: |
          echo "SUPABASE_URL=http://127.0.0.1:54321" >> .env
          echo "SUPABASE_ANON_KEY=$(supabase status -o json | jq -r '.ANON_KEY')" >> .env
      - name: Test connection
        run: pnpm test:connection
      - name: Test SDK
        run: pnpm test:sdk
      - name: Test features
        run: pnpm test:features
      - name: Test auth
        run: pnpm test:auth
      - name: Test chat
        run: pnpm test:chat
      - name: Stop Supabase
        if: always()
        run: supabase stop
