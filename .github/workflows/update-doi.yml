name: Update DOI after release

on:
  release:
    types: [published]

jobs:
  update-doi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Wait for Zenodo to mint DOI
        run: sleep 90

      - name: Fetch latest version-specific DOI from Zenodo API
        id: doi
        run: |
          # Known version record ID (any existing version works as entry point)
          KNOWN_RECORD="19125797"
          # Use the /versions/latest endpoint to get the newest version
          LATEST_URL="https://zenodo.org/api/records/${KNOWN_RECORD}/versions/latest"
          RESPONSE=$(curl -sL "$LATEST_URL")

          NEW_DOI=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              doi = data.get('doi', '')
              version = data.get('metadata', {}).get('version', '')
              print(f'{doi}')
              import sys as s2
              s2.stderr.write(f'Resolved: doi={doi} version={version}\n')
          except Exception as e:
              import sys as s2
              s2.stderr.write(f'Error: {e}\n')
              print('')
          " 2>/dev/null || true)

          if [ -z "$NEW_DOI" ]; then
            echo "Could not resolve version-specific DOI, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "new_doi=$NEW_DOI" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Resolved version-specific DOI: $NEW_DOI"

      - name: Update README.md
        if: steps.doi.outputs.skip != 'true'
        run: |
          NEW_DOI="${{ steps.doi.outputs.new_doi }}"
          sed -i "s|10\.5281/zenodo\.[0-9]*|${NEW_DOI}|g" README.md
          echo "Updated README.md with DOI: $NEW_DOI"

      - name: Update CITATION.cff
        if: steps.doi.outputs.skip != 'true'
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          DATE=$(date -u +%Y-%m-%d)
          sed -i "s/^version: .*/version: ${VERSION}/" CITATION.cff
          sed -i "s/^date-released: .*/date-released: \"${DATE}\"/" CITATION.cff
          echo "Updated CITATION.cff: version=$VERSION date=$DATE"

      - name: Check for changes
        if: steps.doi.outputs.skip != 'true'
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.doi.outputs.skip != 'true' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CITATION.cff
          git commit -m "docs: auto-update DOI to ${{ steps.doi.outputs.new_doi }} [skip ci]"
          git push
