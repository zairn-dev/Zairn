name: Update DOI after release

on:
  release:
    types: [published]

jobs:
  update-doi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Wait for Zenodo to mint DOI
        run: sleep 90

      - name: Fetch latest version-specific DOI from Zenodo API
        id: doi
        run: |
          # Zenodo concept record ID (from the concept DOI 10.5281/zenodo.19003580)
          CONCEPT_ID="19003580"
          # Query Zenodo API for the concept record — it returns the latest version
          RESPONSE=$(curl -s "https://zenodo.org/api/records/${CONCEPT_ID}")

          # Extract the version-specific DOI from the response
          NEW_DOI=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              # The 'doi' field is the version-specific DOI
              print(data.get('doi', ''))
          except:
              print('')
          " 2>/dev/null || true)

          if [ -z "$NEW_DOI" ]; then
            # Fallback: try the 'latest' link
            LATEST_URL=$(echo "$RESPONSE" | python3 -c "
            import sys, json
            try:
                data = json.load(sys.stdin)
                for link in data.get('links', {}).values():
                    if isinstance(link, str) and '/records/' in link and link != data.get('links', {}).get('self', ''):
                        pass
                latest = data.get('links', {}).get('latest', '')
                print(latest)
            except:
                print('')
            " 2>/dev/null || true)

            if [ -n "$LATEST_URL" ]; then
              LATEST_RESP=$(curl -s "$LATEST_URL")
              NEW_DOI=$(echo "$LATEST_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('doi',''))" 2>/dev/null || true)
            fi
          fi

          # Verify it's a version-specific DOI (not concept)
          if [ "$NEW_DOI" = "10.5281/zenodo.${CONCEPT_ID}" ]; then
            echo "WARNING: Got concept DOI instead of version DOI"
            # Try to get latest version from concept metadata
            NEW_DOI=$(echo "$RESPONSE" | python3 -c "
            import sys, json
            data = json.load(sys.stdin)
            latest_id = data.get('links', {}).get('latest', '').split('/')[-1]
            if latest_id and latest_id != '${CONCEPT_ID}':
                print(f'10.5281/zenodo.{latest_id}')
            else:
                print('')
            " 2>/dev/null || true)
          fi

          if [ -z "$NEW_DOI" ] || [ "$NEW_DOI" = "10.5281/zenodo.${CONCEPT_ID}" ]; then
            echo "Could not resolve version-specific DOI, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "new_doi=$NEW_DOI" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Resolved version-specific DOI: $NEW_DOI"

      - name: Update README.md
        if: steps.doi.outputs.skip != 'true'
        run: |
          NEW_DOI="${{ steps.doi.outputs.new_doi }}"
          sed -i "s|10\.5281/zenodo\.[0-9]*|${NEW_DOI}|g" README.md
          echo "Updated README.md with DOI: $NEW_DOI"

      - name: Update CITATION.cff
        if: steps.doi.outputs.skip != 'true'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          DATE=$(date -u +%Y-%m-%d)
          sed -i "s/^version: .*/version: ${VERSION}/" CITATION.cff
          sed -i "s/^date-released: .*/date-released: \"${DATE}\"/" CITATION.cff
          echo "Updated CITATION.cff: version=$VERSION date=$DATE"

      - name: Check for changes
        if: steps.doi.outputs.skip != 'true'
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.doi.outputs.skip != 'true' && steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md CITATION.cff
          git commit -m "docs: auto-update DOI to ${{ steps.doi.outputs.new_doi }} [skip ci]"
          git push
